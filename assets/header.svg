<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">筱柒 Littleseven digital field notes</title>
  <desc id="desc">A warm paper-toned developer profile banner with blueprint grid lines, abstract orbital paths, and technical annotations.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F0DB"/>
      <stop offset="0.58" stop-color="#EFE2C5"/>
      <stop offset="1" stop-color="#E4D0AB"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#27313A" stroke-opacity=".09" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="22" fill="url(#paper)"/>
  <rect width="1200" height="360" rx="22" fill="url(#grid)"/>
  <circle cx="1050" cy="92" r="122" fill="#6F9BB3" fill-opacity=".18" filter="url(#soft)"/>
  <circle cx="944" cy="294" r="88" fill="#B85D35" fill-opacity=".14" filter="url(#soft)"/>

  <path d="M750 339C861 204 971 139 1178 120" stroke="#27313A" stroke-opacity=".35" stroke-width="1.4" stroke-dasharray="3 7"/>
  <path d="M807 360C845 236 960 145 1176 62" stroke="#B85D35" stroke-opacity=".7" stroke-width="2"/>
  <path d="M882 360C909 254 1007 191 1197 167" stroke="#47768E" stroke-opacity=".8" stroke-width="2"/>
  <circle cx="1007" cy="191" r="8" fill="#F7F0DB" stroke="#47768E" stroke-width="2"/>
  <circle cx="960" cy="145" r="5" fill="#B85D35"/>
  <circle cx="1176" cy="62" r="5" fill="#27313A"/>

  <path d="M64 63H124" stroke="#B85D35" stroke-width="4"/>
  <text x="64" y="105" fill="#27313A" font-family="'Courier New', monospace" font-size="18" letter-spacing="5">DIGITAL FIELD NOTES</text>
  <text x="64" y="197" fill="#1F272E" font-family="Georgia, serif" font-size="64" font-weight="700">筱柒 Littleseven</text>
  <text x="68" y="240" fill="#47768E" font-family="'Courier New', monospace" font-size="17" letter-spacing="3">BUILD · OBSERVE · REFINE</text>

  <text x="68" y="311" fill="#27313A" fill-opacity=".66" font-family="'Courier New', monospace" font-size="13" letter-spacing="1.5">LOG 07 / A SMALL TOOL CAN STILL BE THOUGHTFUL.</text>
  <text x="1056" y="309" fill="#27313A" fill-opacity=".66" font-family="'Courier New', monospace" font-size="12" letter-spacing="1">31.2304° N</text>
  <text x="1056" y="329" fill="#27313A" fill-opacity=".66" font-family="'Courier New', monospace" font-size="12" letter-spacing="1">121.4737° E</text>

  <path d="M996 52H1160" stroke="#27313A" stroke-opacity=".55"/>
  <path d="M1100 42V62" stroke="#27313A" stroke-opacity=".55"/>
  <text x="996" y="38" fill="#27313A" fill-opacity=".72" font-family="'Courier New', monospace" font-size="11" letter-spacing="1">WORKBENCH / 2026</text>
  <rect x=".75" y=".75" width="1198.5" height="358.5" rx="21.25" stroke="#27313A" stroke-opacity=".24" stroke-width="1.5"/>
</svg>
